<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="badge-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9bb0c4"/>
      <stop offset="100%" stop-color="#7b8fa3"/>
    </linearGradient>
  </defs>
  <!-- Circle badge -->
  <circle cx="20" cy="20" r="19" fill="none" stroke="url(#badge-gradient)" stroke-width="1.5"/>
  <!-- D letter -->
  <text x="10" y="27.5" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="18" fill="url(#badge-gradient)">D</text>
  <!-- R letter -->
  <text x="22" y="27.5" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="18" fill="url(#badge-gradient)">R</text>
</svg>
