<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
/* {{BASE_CSS}} */

body {
    background: var(--bg-deep);
    position: relative;
    margin: 0;
    overflow: hidden;
}

.bg-image {
    position: absolute;
    inset: 0;
    background-image: url('{{IMAGE_URL}}');
    background-size: cover;
    background-position: center;
    z-index: 0;
}

/* Subtle bottom gradient for legibility of caption / website strip */
.bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 100%);
    z-index: 1;
}

/* Logo badge — top right */
.header {
    position: absolute;
    top: 36px;
    right: 36px;
    z-index: 3;
}

.header .logo-badge {
    background: rgba(255, 255, 255, 0.92);
    border-radius: 14px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}

.header .logo-badge svg { max-height: 36px; width: auto; }
.header .brand-name {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #1a1a1a;
}

/* Optional caption strip — bottom */
.caption-strip {
    position: absolute;
    bottom: 84px;
    left: 48px;
    right: 48px;
    z-index: 3;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 14px;
    padding: 22px 28px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 500;
    line-height: 1.4;
    max-height: 140px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
}

/* Bottom website bar */
.bottom-bar {
    position: absolute;
    bottom: 24px;
    left: 0;
    right: 0;
    z-index: 4;
    text-align: center;
    color: rgba(255, 255, 255, 0.85);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
}
</style>
</head>
<body>
<div class="bg-image"></div>
<div class="bg-overlay"></div>

<div class="header">
    <div class="logo-badge">
        {{LOGO_SVG}}
        <span class="brand-name">{{BRAND_NAME}}</span>
    </div>
</div>

{{CAPTION_BLOCK}}

<div class="bottom-bar">{{WEBSITE}}</div>

</body>
</html>
