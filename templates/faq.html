<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
/* {{BASE_CSS}} */

body {
    background: var(--bg-deep);
    position: relative;
    display: flex;
    flex-direction: column;
}

/* Header logo */
.header {
    position: absolute;
    top: 40px;
    left: 48px;
    z-index: 2;
}

/* Large question mark watermark */
.question-watermark {
    position: absolute;
    top: 50%;
    right: 40px;
    transform: translateY(-50%);
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 500px;
    font-weight: 700;
    color: var(--accent);
    opacity: 0.04;
    pointer-events: none;
    line-height: 1;
    z-index: 1;
}

/* Main content */
.faq-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px 64px 100px;
    position: relative;
    z-index: 2;
}

.faq-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
    width: fit-content;
}

.faq-badge-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-bright));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--bg-deep);
}

.faq-badge-text {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent-bright);
}

.faq-question {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 44px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
    margin-bottom: 32px;
    max-width: 800px;
}

.faq-answer-container {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-elevated);
    border-radius: 16px;
    padding: 28px 32px;
    max-width: 750px;
}

.faq-answer-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent-light);
    margin-bottom: 12px;
}

.faq-answer {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 400;
    line-height: 1.7;
    color: var(--text-light);
}

/* Bottom bar */
.bottom-bar {
    background: linear-gradient(90deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
    border-top: 1px solid var(--border-cool);
}
</style>
</head>
<body>

<!-- Question mark watermark -->
<div class="question-watermark">?</div>

<!-- Header: Logo badge -->
<div class="header">
    <div class="logo-badge">
        {{LOGO_SVG}}
        <span class="brand-name">{{BRAND_NAME}}</span>
    </div>
</div>

<!-- FAQ content -->
<div class="faq-content">
    <div class="faq-badge">
        <div class="faq-badge-icon">?</div>
        <span class="faq-badge-text">Domande Frequenti</span>
    </div>
    <h2 class="faq-question">{{TITLE}}</h2>
    <div class="faq-answer-container">
        <div class="faq-answer-label">Risposta</div>
        <p class="faq-answer">{{DESCRIPTION}}</p>
    </div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
    <span class="site-url">{{WEBSITE}}</span>
    <span class="separator"></span>
    <span class="tagline">{{TAGLINE}}</span>
</div>

</body>
</html>
